<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSE Class 10 Mathematics — Question Bank</title>

<!-- KaTeX for LaTeX rendering -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<style>
/* ── Tokens ───────────────────────────────────────────────────────────────── */
:root {
  --ink:       #1a1814;
  --ink2:      #4a4640;
  --ink3:      #8a8480;
  --rule:      #e8e4de;
  --rule2:     #d0ccc4;
  --surface:   #faf8f4;
  --surface2:  #f2ede4;
  --page:      #fffef9;
  --accent:    #c8450a;
  --accent2:   #e85a20;
  --accent-bg: #fdf1eb;
  --tag-bg:    #eeeae2;
  --tag-ink:   #5a5650;
  --green:     #1a6b3c;
  --green-bg:  #eaf4ee;
  --blue:      #1a4a8a;
  --blue-bg:   #eaf0f8;
  --r: 6px;
  --font-body: 'Georgia', 'Times New Roman', serif;
  --font-ui:   'Helvetica Neue', Arial, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--page);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* ── Header ───────────────────────────────────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  background: var(--ink);
  color: #fff;
  padding: 18px 28px;
  display: flex;
  align-items: baseline;
  gap: 20px;
  border-bottom: 3px solid var(--accent);
}
.header-title {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #fff;
}
.header-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-ui);
}
.header-count {
  margin-left: auto;
  font-family: var(--font-ui);
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.04em;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: calc(100vh - 58px);
}

.sidebar-section {
  padding: 16px 20px 8px;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  border-bottom: 1px solid var(--rule);
}

.chapter-list { list-style: none; }

.chapter-btn {
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 12px 20px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  transition: background 0.12s;
}
.chapter-btn:hover { background: var(--surface2); }
.chapter-btn.active { background: var(--accent-bg); border-left: 3px solid var(--accent); }

.chapter-num {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
}
.chapter-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
}
.chapter-meta {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--ink3);
}

/* ── Main content ─────────────────────────────────────────────────────────── */
.main {
  overflow-y: auto;
  height: calc(100vh - 58px);
  background: var(--page);
}

.content-pad { padding: 28px 36px; max-width: 820px; }

/* ── Home screen ──────────────────────────────────────────────────────────── */
.home {
  padding: 48px 36px;
  max-width: 640px;
}
.home-title {
  font-size: 28px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 12px;
}
.home-desc {
  font-size: 16px;
  color: var(--ink2);
  margin-bottom: 32px;
}
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.home-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
  text-align: left;
}
.home-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(200,69,10,0.1);
}
.home-card-num {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.home-card-name {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 6px;
}
.home-card-count {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--ink3);
}

/* ── Chapter header ───────────────────────────────────────────────────────── */
.chapter-header {
  border-bottom: 1px solid var(--rule);
  margin-bottom: 20px;
  padding-bottom: 16px;
}
.chapter-header h1 {
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 4px;
}
.chapter-header-meta {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--ink3);
}

/* ── Filters bar ──────────────────────────────────────────────────────────── */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink3);
}
.filter-btn {
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--rule2);
  border-radius: 20px;
  background: var(--page);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.1s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.filter-divider {
  width: 1px;
  height: 20px;
  background: var(--rule2);
}

/* ── Topics sidebar inside chapter ───────────────────────────────────────── */
.topic-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.topic-pill {
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--tag-bg);
  color: var(--tag-ink);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.1s;
}
.topic-pill:hover { border-color: var(--ink3); }
.topic-pill.active { background: var(--ink); color: #fff; }
.topic-pill.subtopic { margin-left: 12px; font-style: italic; }

/* ── Questions list ───────────────────────────────────────────────────────── */
.questions-count {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--ink3);
  margin-bottom: 14px;
}

.question-card {
  border: 1px solid var(--rule);
  border-radius: var(--r);
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.12s;
}
.question-card:hover { border-color: var(--rule2); }

.question-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
}

.question-num {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  min-width: 32px;
  padding-top: 2px;
}

.question-body { flex: 1; }

.question-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 10px;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
}
.option-item {
  font-size: 14px;
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 4px;
  color: var(--ink2);
}

.question-footer {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  padding: 10px 18px;
  background: var(--surface);
  border-top: 1px solid var(--rule);
}

.badge {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
}
.badge-marks-1 { background: var(--blue-bg);  color: var(--blue);  }
.badge-marks-2 { background: var(--tag-bg);   color: var(--tag-ink); }
.badge-marks-3 { background: var(--green-bg); color: var(--green); }
.badge-marks-4 { background: var(--accent-bg); color: var(--accent); }
.badge-marks-5 { background: #f8eaf8; color: #6a1a8a; }

.source-badge {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--ink3);
  margin-left: auto;
}

.topic-tag {
  font-family: var(--font-ui);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--tag-bg);
  color: var(--tag-ink);
}
.topic-tag.subtopic { font-style: italic; }

/* ── Empty state ──────────────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
  font-family: var(--font-ui);
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* ── Loading ──────────────────────────────────────────────────────────────── */
.loading {
  text-align: center;
  padding: 60px 20px;
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--ink3);
}

/* ── Error ────────────────────────────────────────────────────────────────── */
.error-msg {
  background: #fff5f5;
  border: 1px solid #fcc;
  border-radius: var(--r);
  padding: 16px 20px;
  color: #c00;
  font-family: var(--font-ui);
  font-size: 13px;
  margin: 20px 0;
}

/* ── Mobile hamburger ─────────────────────────────────────────────────────── */
.menu-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  margin-right: 8px;
}
.menu-toggle span {
  display: block;
  width: 20px;
  height: 2px;
  background: #fff;
  margin: 4px 0;
  transition: all 0.2s;
}

/* ── Mobile ───────────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .shell { grid-template-columns: 1fr; }

  .menu-toggle { display: block; }

  .sidebar {
    position: fixed;
    top: 0;
    left: -300px;
    width: 280px;
    height: 100vh;
    z-index: 100;
    transition: left 0.25s ease;
    box-shadow: 2px 0 16px rgba(0,0,0,0.15);
  }
  .sidebar.open { left: 0; }

  .main { height: calc(100vh - 58px); }
  .content-pad { padding: 20px 16px; }
  .home { padding: 28px 16px; }

  .options-grid { grid-template-columns: 1fr; }

  .header { padding: 14px 16px; }
  .header-sub { display: none; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }
  .overlay.active { display: block; }
}
</style>
</head>
<body>

<div class="shell" id="shell">
  <!-- Header -->
  <header class="header">
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div>
      <div class="header-title">CBSE Class 10 · Mathematics</div>
      <div class="header-sub">Past Paper Question Bank</div>
    </div>
    <div class="header-count" id="headerCount"></div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Chapters</div>
    <ul class="chapter-list" id="chapterList">
      <li style="padding:20px;font-family:var(--font-ui);font-size:13px;color:var(--ink3)">Loading…</li>
    </ul>
  </nav>

  <!-- Main -->
  <main class="main" id="main">
    <div id="mainContent">
      <div class="loading">Loading question bank…</div>
    </div>
  </main>
</div>

<!-- Mobile overlay -->
<div class="overlay" id="overlay"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Replace with your Cloudflare Worker URL after deploying
const API_BASE = "https://cbse-math-qbank.YOUR_SUBDOMAIN.workers.dev/api";

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  chapters: [],
  activeChapterId: null,
  activeChapterData: null,
  filterMarks: null,    // "1","2","3","4" or null
  filterYear: null,
  filterTopicId: null,
};

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  // Mobile menu
  const toggle = document.getElementById("menuToggle");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  toggle.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("active");
  });
  overlay.addEventListener("click", () => {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
  });

  // Load chapter index
  try {
    const data = await apiFetch("/chapters");
    state.chapters = data.chapters || [];
    renderSidebar();
    renderHome();
    const total = state.chapters.reduce((s, c) => s + c.total, 0);
    document.getElementById("headerCount").textContent =
      `${total.toLocaleString()} questions · ${state.chapters.length} chapters`;
  } catch (e) {
    document.getElementById("mainContent").innerHTML =
      `<div style="padding:40px"><div class="error-msg">
        Could not connect to the API. Make sure your Cloudflare Worker is deployed
        and API_BASE is set correctly in this file.
        <br><br><code>${e.message}</code>
      </div></div>`;
  }
});

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
  return res.json();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById("chapterList");
  list.innerHTML = state.chapters.map(ch => `
    <li>
      <button class="chapter-btn ${state.activeChapterId === ch.id ? "active" : ""}"
              onclick="loadChapter('${ch.id}')">
        <span class="chapter-num">Ch. ${ch.id}</span>
        <span class="chapter-name">${esc(ch.name)}</span>
        <span class="chapter-meta">${ch.total} questions</span>
      </button>
    </li>
  `).join("");
}

// ── Home screen ───────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById("mainContent").innerHTML = `
    <div class="home">
      <h1 class="home-title">CBSE Class 10<br>Mathematics</h1>
      <p class="home-desc">
        Previous year exam questions, organised by chapter and topic.
        Click any chapter to browse questions.
      </p>
      <div class="home-grid">
        ${state.chapters.map(ch => `
          <div class="home-card" onclick="loadChapter('${ch.id}')">
            <div class="home-card-num">Ch. ${ch.id}</div>
            <div class="home-card-name">${esc(ch.name)}</div>
            <div class="home-card-count">${ch.total} questions</div>
          </div>
        `).join("")}
      </div>
    </div>`;
}

// ── Load chapter ──────────────────────────────────────────────────────────────
async function loadChapter(id) {
  state.activeChapterId = id;
  state.filterMarks = null;
  state.filterYear = null;
  state.filterTopicId = null;
  renderSidebar();

  // Close mobile sidebar
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("active");

  document.getElementById("mainContent").innerHTML =
    `<div class="loading">Loading chapter…</div>`;

  try {
    const data = await apiFetch(`/chapters/${id}`);
    state.activeChapterData = data;
    renderChapter();
  } catch (e) {
    document.getElementById("mainContent").innerHTML =
      `<div style="padding:40px"><div class="error-msg">${e.message}</div></div>`;
  }
}

// ── Render chapter ────────────────────────────────────────────────────────────
function renderChapter() {
  const { chapter, questions } = state.activeChapterData;

  // Unique years in this chapter
  const years = [...new Set(questions.map(q => q.year).filter(Boolean))].sort();

  let filtered = applyFilters(questions);

  const html = `
    <div class="content-pad">
      <div class="chapter-header">
        <h1>Chapter ${chapter.id}: ${esc(chapter.name)}</h1>
        <div class="chapter-header-meta">
          ${chapter.total} questions &middot; Years: ${years.join(", ")}
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="filter-group">
          <span class="filter-label">Marks</span>
          ${["1","2","3","4","5"].map(m => {
            const hasAny = questions.some(q => q.marks === m);
            return hasAny ? `<button class="filter-btn ${state.filterMarks === m ? "active" : ""}"
              onclick="setFilter('marks','${m}')">${m}M</button>` : "";
          }).join("")}
        </div>
        ${years.length > 1 ? `
        <div class="filter-divider"></div>
        <div class="filter-group">
          <span class="filter-label">Year</span>
          ${years.map(y => `
            <button class="filter-btn ${state.filterYear === y ? "active" : ""}"
              onclick="setFilter('year','${y}')">${y}</button>
          `).join("")}
        </div>` : ""}
        ${(state.filterMarks || state.filterYear || state.filterTopicId) ? `
        <button class="filter-btn" style="margin-left:auto"
          onclick="clearFilters()">✕ Clear</button>` : ""}
      </div>

      <!-- Topics -->
      <div class="topic-pills">
        ${chapter.topics.map(t => `
          <span class="topic-pill ${t.is_subtopic ? "subtopic" : ""} ${state.filterTopicId === t.id ? "active" : ""}"
                onclick="setFilter('topic','${t.id}')">
            ${t.is_subtopic ? "↳ " : ""}${esc(t.name.replace(/^↳\s*/, ""))}
          </span>
        `).join("")}
      </div>

      <!-- Count -->
      <div class="questions-count">
        Showing ${filtered.length} of ${questions.length} questions
      </div>

      <!-- Questions -->
      ${filtered.length === 0
        ? `<div class="empty"><div class="empty-icon">○</div>No questions match these filters.</div>`
        : filtered.map(q => renderQuestion(q)).join("")
      }
    </div>`;

  document.getElementById("mainContent").innerHTML = html;
  document.getElementById("main").scrollTop = 0;

  // Render LaTeX after DOM update
  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById("mainContent"), {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$",  right: "$",  display: false },
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true },
      ],
      throwOnError: false,
    });
  }
}

// ── Render single question ────────────────────────────────────────────────────
function renderQuestion(q) {
  const marksClass = `badge-marks-${q.marks}`;
  const isMultipart = q.text.includes("\\\\"); // multipart questions use \\

  // Clean up text: replace \\ with line breaks for display
  const displayText = q.text.replace(/\\\\/g, "<br><br>");

  const optionsHtml = q.options && q.options.length > 0
    ? `<div class="options-grid">
        ${q.options.map(o => `<div class="option-item">${esc(o)}</div>`).join("")}
       </div>`
    : "";

  const topicTags = (q.topics || []).map(t =>
    `<span class="topic-tag ${t.is_subtopic ? "subtopic" : ""}">${esc(t.name.replace(/^↳\s*/,""))}</span>`
  ).join("");

  return `
    <div class="question-card">
      <div class="question-top">
        <span class="question-num">${esc(q.q_no)}</span>
        <div class="question-body">
          <div class="question-text">${displayText}</div>
          ${optionsHtml}
        </div>
      </div>
      <div class="question-footer">
        <span class="badge ${marksClass}">${q.marks} mark${q.marks !== "1" ? "s" : ""}</span>
        ${topicTags}
        ${q.source_label ? `<span class="source-badge">${esc(q.source_label)}</span>` : ""}
      </div>
    </div>`;
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters(questions) {
  return questions.filter(q => {
    if (state.filterMarks && q.marks !== state.filterMarks) return false;
    if (state.filterYear  && q.year  !== state.filterYear)  return false;
    if (state.filterTopicId && !q.topics.some(t => t.id === state.filterTopicId)) return false;
    return true;
  });
}

function setFilter(type, value) {
  if (type === "marks") {
    state.filterMarks = state.filterMarks === value ? null : value;
  } else if (type === "year") {
    state.filterYear = state.filterYear === value ? null : value;
  } else if (type === "topic") {
    state.filterTopicId = state.filterTopicId === value ? null : value;
  }
  renderChapter();
}

function clearFilters() {
  state.filterMarks = null;
  state.filterYear = null;
  state.filterTopicId = null;
  renderChapter();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
